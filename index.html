<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP de Maple — メイプルストーリー ツール集</title>
<style>
  :root{
    --bg:#14101f;
    --panel:#1d1830;
    --line:#332a4d;
    --cyan:#59e3d8;
    --cyan-dim:rgba(89,227,216,.14);
    --gold:#f2c14e;
    --txt:#e8e4f5;
    --muted:#9a92b5;
    --jp:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","Yu Gothic UI","Meiryo",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{color-scheme:dark}
  body{
    background:var(--bg);
    background-image:
      radial-gradient(1000px 500px at 85% -10%, rgba(89,227,216,.06), transparent 60%),
      radial-gradient(800px 420px at 0% 110%, rgba(140,90,220,.08), transparent 60%);
    color:var(--txt);
    font-family:var(--jp);
    font-size:14px;
    line-height:1.7;
    padding:48px 20px 64px;
    min-height:100vh;
  }
  .wrap{max-width:720px;margin:0 auto}
  header{margin-bottom:32px;display:flex;align-items:center;gap:16px}
  .hexmark{width:52px;height:58px;flex:none}
  h1{font-size:24px;font-weight:800;letter-spacing:.06em}
  .sub{color:var(--muted);font-size:13px;margin-top:2px}
  .eyebrow{display:flex;align-items:center;gap:8px;font-size:11.5px;letter-spacing:.22em;color:var(--cyan);font-weight:700;margin-bottom:14px}
  .eyebrow::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}
  a.tool{
    display:block;text-decoration:none;color:var(--txt);
    background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:18px 20px;margin-bottom:14px;
    transition:border-color .15s, background .15s;
  }
  a.tool:hover{border-color:var(--cyan);background:#221b3a}
  a.tool h2{font-size:16px;font-weight:700;color:var(--cyan);margin-bottom:4px}
  a.tool h2::before{content:"⬢ ";font-size:12px}
  a.tool p{font-size:12.5px;color:var(--muted)}
  .footnote{margin-top:40px;font-size:11.5px;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">

<header>
  <svg class="hexmark" viewBox="0 0 52 58" aria-hidden="true">
    <polygon points="26,2 50,15 50,43 26,56 2,43 2,15" fill="none" stroke="#59e3d8" stroke-width="2.5"/>
    <polygon points="26,14 40,22 40,36 26,44 12,36 12,22" fill="rgba(89,227,216,.12)" stroke="#f2c14e" stroke-width="1.5"/>
  </svg>
  <div>
    <h1>VIP de Maple</h1>
    <div class="sub">メイプルストーリーの計算・シミュレーションツール集</div>
  </div>
</header>

<div class="eyebrow">ツール一覧</div>

<a class="tool" href="./hexa/">
  <h2>HEXAステータス 効率計算機</h2>
  <p>キャラクターのステータスと各コアのLvから、火力上昇率が最大になるステータスコアの組み合わせを全探索で求めます。</p>
</a>

<a class="tool" href="./kms/">
  <h2>KMS動画検索 変換辞典</h2>
  <p>職業・ボス・狩り場・頻出ワードを日本語で検索して、韓国コミュニティで実際に使われる通称(나로・하스우 など)に変換。タップで検索語を組み立てて、そのままYouTube検索へ。</p>
</a>

<div class="footnote">非公式のファンメイドツールです。ゲーム内仕様の変更により数値が実際と異なる場合があります。</div>

</div>
</body>
</html>
